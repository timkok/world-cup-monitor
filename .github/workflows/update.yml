name: Daily ticket data update

on:
  schedule:
    # 12:00 UTC daily = 20:00 Beijing / 08:00 US Eastern
    - cron: '0 12 * * *'
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push if CSV changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet seatgeek_data.csv; then
            echo "No changes to commit."
          else
            git add seatgeek_data.csv
            git commit -m "chore: daily price update $(date -u +%Y-%m-%d)"
            git push
          fi
