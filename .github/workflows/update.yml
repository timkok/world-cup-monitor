name: SeatGeek scrape (15-min)

on:
  schedule:
    - cron: '*/5 * * * *'  # every 5 min (GH Actions minimum for public repos)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seatgeek-scrape
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run scraper
        run: python scraper.py

      - name: Run realtime status update
        run: python realtime_status.py

      - name: Run notifier
        env:
          USER_TARGETS: ${{ secrets.USER_TARGETS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notifier.py
        continue-on-error: true

      - name: Run data health check
        run: python data_health_check.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add seatgeek_data.csv price_history.csv realtime_status.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: hourly price update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
