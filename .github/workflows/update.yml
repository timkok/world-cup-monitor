name: SeatGeek scrape (15-min)

on:
  schedule:
    - cron: '0,15,30,45 * * * *'  # every 15 min, SG slot. GitHub Actions cron can lag 5-15 min under load.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: seatgeek-scrape
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run scraper
        run: python scraper.py

      - name: Run Discord Notification Alerts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python notify.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add seatgeek_data.csv price_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: hourly price update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
