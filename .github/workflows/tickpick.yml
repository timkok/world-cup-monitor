name: Hourly TickPick scrape

on:
  schedule:
    - cron: '15 * * * *'  # offset from the SeatGeek mock job to avoid push collisions
  workflow_dispatch:

permissions:
  contents: write

# Prevent two scheduled runs from racing each other
concurrency:
  group: tickpick-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TickPick scraper
        run: python tickpick_scraper.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Pull latest in case the SeatGeek workflow pushed during our run
          git pull --rebase origin main || true
          git add tickpick_data.csv tickpick_history.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: tickpick price update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
